name: 每周自动更新模型定价

on:
  schedule:
    # 每周一 UTC 02:00（北京时间 10:00）执行
    - cron: '0 2 * * 1'
  workflow_dispatch: # 支持手动触发

permissions:
  contents: write # 允许提交到仓库

jobs:
  update-pricing:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 运行定价更新脚本
        run: python scripts/update_pricing.py
        continue-on-error: true # 即使部分抓取失败也继续

      - name: 重新规范化数据
        run: python scripts/normalize_data.py
        continue-on-error: true

      - name: 检查是否有变更
        id: check_changes
        run: |
          if [ -f data/update_summary.txt ]; then
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "📋 变更摘要:"
            cat data/update_summary.txt
          else
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "本次无价格变更"
          fi

      - name: 提交并推送
        if: steps.check_changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing.json data/update_summary.txt
          git commit -m "🔄 每周定价自动更新 ($(date -u +%Y-%m-%d))

          $(cat data/update_summary.txt 2>/dev/null || echo '自动更新定价数据')"
          git push

      - name: 仅更新日期（无价格变更时）
        if: steps.check_changes.outputs.has_changes == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/pricing.json
          git diff --staged --quiet || git commit -m "📅 定价数据日期更新 ($(date -u +%Y-%m-%d))

          本周无价格变动，仅刷新更新日期。"
          git diff --staged --quiet || git push
